name: Build and Release

on:
  push:
    tags:
      - 'v*'  # Executa quando você criar uma tag como v1.0.3
  workflow_dispatch:  # Permite executar manualmente

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri app (with installer)
        run: npm run tauri build
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}

      - name: Build portable executable only
        run: |
          npm run tauri build -- --no-bundle
          # O executável portátil estará em: src-tauri/target/release/king-network-tools.exe
          # Renomear para deixar claro que é portátil
          mkdir portable
          copy src-tauri\target\release\king-network-tools.exe portable\KingNetworkTools-Portable.exe

      - name: Create portable .zip package (optional)
        run: |
          powershell Compress-Archive -Path portable\*.exe -DestinationPath portable\KingNetworkTools-Portable.zip
          # Inclui um README rápido para o portátil
          echo "KingNetworkTools - Portable Version`n`nJust run KingNetworkTools-Portable.exe directly, no installation required." > portable\README.txt
          powershell Compress-Archive -Path portable\* -DestinationPath portable\KingNetworkTools-Portable-Complete.zip

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-builds
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
            portable/KingNetworkTools-Portable.exe
            portable/KingNetworkTools-Portable-Complete.zip

  build-linux:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev \
            libappindicator3-dev librsvg2-dev patchelf \
            iproute2 iputils-ping traceroute iputils-tracepath mtr-tiny

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri app (bundled)
        run: npm run tauri build

      - name: Build portable executable
        run: |
          npm run tauri build -- --no-bundle
          mkdir -p portable
          cp src-tauri/target/release/king-network-tools portable/KingNetworkTools-Portable
          chmod +x portable/KingNetworkTools-Portable
          # Criar .tar.gz para Linux
          tar -czf portable/KingNetworkTools-Portable.tar.gz -C portable KingNetworkTools-Portable

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-builds
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
            portable/KingNetworkTools-Portable
            portable/KingNetworkTools-Portable.tar.gz

  create-release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/windows-builds/**/*.msi
            artifacts/windows-builds/**/*.exe
            artifacts/windows-builds/**/*.zip
            artifacts/linux-builds/**/*.deb
            artifacts/linux-builds/**/*.AppImage
            artifacts/linux-builds/**/KingNetworkTools-Portable
            artifacts/linux-builds/**/*.tar.gz
          body: |
            ## KingNetworkTools ${{ github.ref_name }}
            
            ### 📦 Downloads disponíveis:
            
            **Windows:**
            - `KingAnaliser-Setup.msi` - Instalador padrão
            - `KingNetworkTools-Portable.exe` - Executável portátil (sem instalação)
            - `KingNetworkTools-Portable.zip` - Pacote portátil compactado
            
            **Linux:**
            - `.deb` - Pacote para Debian/Ubuntu
            - `.AppImage` - Executável universal
            - `KingNetworkTools-Portable` - Binário portátil
            - `.tar.gz` - Pacote portátil compactado
            
            ### 🚀 Como usar a versão portátil:
            - **Windows:** Baixe o `.exe` e execute diretamente
            - **Linux:** Dê permissão de execução (`chmod +x`) e execute
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}