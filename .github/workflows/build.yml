name: Build — King Analiser

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      
      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev pkg-config
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu
      
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      
      - run: npm install
      
      - name: Build Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'King Analiser ${{ github.ref_name }}'
          releaseBody: 'Build automático — ${{ github.ref_name }}'
          releaseDraft: false
          prerelease: false
          args: --target x86_64-unknown-linux-gnu
      
      - name: Build portable
        run: |
          npm run tauri build -- --no-bundle --target x86_64-unknown-linux-gnu
          mkdir -p portable
          cp src-tauri/target/x86_64-unknown-linux-gnu/release/king-analiser portable/KingNetworkTools-Portable
          chmod +x portable/KingNetworkTools-Portable
          tar -czf portable/KingNetworkTools-Portable-Linux.tar.gz -C portable KingNetworkTools-Portable
      
      - uses: actions/upload-artifact@v4
        with:
          name: linux-portable
          path: portable/KingNetworkTools-Portable-Linux.tar.gz

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'          
      
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      
      - run: npm install
      
      - name: Build Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'King Analiser ${{ github.ref_name }}'
          releaseBody: 'Build automático — ${{ github.ref_name }}'
          releaseDraft: false
          prerelease: false
          args: --target x86_64-pc-windows-msvc
      
      - name: Build portable
        shell: pwsh
        run: |
          npm run tauri build -- --no-bundle --target x86_64-pc-windows-msvc
          New-Item -ItemType Directory -Force -Path portable | Out-Null
          Copy-Item "src-tauri\target\x86_64-pc-windows-msvc\release\king-analiser.exe" "portable\KingNetworkTools-Portable.exe"
          Compress-Archive -Path portable\* -DestinationPath portable\KingNetworkTools-Portable-Windows.zip
      
      - uses: actions/upload-artifact@v4
        with:
          name: windows-portable
          path: portable/KingNetworkTools-Portable-Windows.zip

  attach-portables:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: windows-portable
          path: windows-portable
      
      - uses: actions/download-artifact@v4
        with:
          name: linux-portable
          path: linux-portable
      
      - uses: softprops/action-gh-release@v1
        with:
          files: |
            windows-portable/*.zip
            linux-portable/*.tar.gz
          append_body: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}