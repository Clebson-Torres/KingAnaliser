name: Build & Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            runner: ubuntu-24.04
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            runner: windows-latest
          - platform: macos-latest
            target: x86_64-apple-darwin
            runner: macos-latest

    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install npm deps
        run: npm ci

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libcurl4-openssl-dev \
            patchelf

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v2
        id: tauri_build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "King Analiser v${{ github.ref_name }}"
          releaseBody: "Consulte RELEASE_NOTES.md para detalhes."
          releaseDraft: true
          includeDebug: false
          args: --target ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: king-analiser-${{ matrix.platform }}
          path: ${{ join(fromJSON(steps.tauri_build.outputs.artifactPaths), '\n') }}
          if-no-files-found: warn
